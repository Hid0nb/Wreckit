<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fix-It Felix Jr. - Arcade Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0; padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            display: flex; flex-direction: column;
            height: 100vh; height: 100dvh; 
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #arcade-cabinet {
            flex: 1; display: flex; flex-direction: column;
            background: linear-gradient(135deg, #111 0%, #2a2a2a 100%);
            border-left: 10px solid #800; border-right: 10px solid #800;
            box-sizing: border-box; position: relative;
        }

        #fullscreen-btn {
            position: absolute; top: 10px; right: 10px;
            width: 40px; height: 40px;
            background: #222; border: 2px solid #555;
            border-radius: 8px; color: #aaa;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-family: sans-serif;
            cursor: pointer; z-index: 20;
            box-shadow: 0 4px 0 #000;
        }
        #fullscreen-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #000; background: #333;
        }

        #screen-bezel {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background: #000; padding: 10px; position: relative;
            box-shadow: inset 0 0 20px #000;
            min-height: 0; 
        }

        /* CRT Effects */
        #game-container {
            position: relative; width: 100%; height: 100%;
            max-width: 400px; max-height: 600px;
            overflow: hidden; border-radius: 10px;
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.2);
        }

        canvas {
            display: block; width: 100%; height: 100%;
            background: #258; image-rendering: pixelated;
        }

        .crt::after {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        /* Arcade Controls */
        #control-deck {
            background: #1a1a1a;
            border-top: 4px solid #444; position: relative;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 10px 10px;
            padding: 20px 10px 30px 10px;
            flex-shrink: 0;
        }

        .control-row {
            display: flex; justify-content: space-around; align-items: center;
            width: 100%; max-width: 500px; margin: 0 auto;
        }

        .d-pad {
            display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px 60px;
            gap: 2px; position: relative;
        }

        .d-btn {
            background: #333; border: 4px solid #111; border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.1), 0 4px 0 #000;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: rgba(255,255,255,0.5); font-family: sans-serif;
        }
        .d-btn:active { background: #444; transform: translateY(4px); box-shadow: inset 0 0 5px rgba(0,0,0,0.5), 0 0 0 #000; }
        
        #btn-up { grid-column: 2; grid-row: 1; border-bottom: none; border-radius: 8px 8px 0 0;}
        #btn-left { grid-column: 1; grid-row: 2; border-right: none; border-radius: 8px 0 0 8px;}
        #btn-center { grid-column: 2; grid-row: 2; background: #222; border: none; box-shadow: none; }
        #btn-right { grid-column: 3; grid-row: 2; border-left: none; border-radius: 0 8px 8px 0;}
        #btn-down { grid-column: 2; grid-row: 3; border-top: none; border-radius: 0 0 8px 8px;}

        .action-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .action-btn {
            width: 90px; height: 90px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff4b4b, #b71c1c);
            border: 5px solid #500; box-shadow: 0 8px 0 #400, 0 15px 20px rgba(0,0,0,0.5);
            color: rgba(255,255,255,0.8); font-size: 16px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            text-shadow: 1px 1px 0 #000; font-family: 'Press Start 2P', monospace;
        }
        .action-btn:active {
            transform: translateY(8px); box-shadow: 0 0 0 #400, 0 5px 10px rgba(0,0,0,0.5);
            background: radial-gradient(circle at 50% 50%, #d32f2f, #9a0000);
        }

        #start-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; text-align: center;
        }
        .blinking { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        #btn-insert-coin {
            margin-top: 30px; padding: 15px 20px; font-size: 16px;
            background: #ffd700; color: #000; border: 4px solid #fff;
            font-family: 'Press Start 2P', monospace; cursor: pointer;
            box-shadow: 0 0 15px #ffd700;
        }
    </style>
</head>
<body>

<div id="arcade-cabinet">
    <div id="fullscreen-btn" title="Toggle Fullscreen">⛶</div>
    <div id="screen-bezel">
        <div id="game-container" class="crt">
            <canvas id="gameCanvas" width="360" height="600"></canvas>
            <div id="start-overlay">
                <h2 style="color:#4cf; text-shadow: 2px 2px #00f;">FIX-IT<br>FELIX JR.</h2>
                <p style="font-size: 10px; line-height: 1.5; color: #aaa; margin: 20px;">
                    Dodge Ralph's bricks!<br>Some windows need<br>two hits to fix.
                </p>
                <button id="btn-insert-coin" class="blinking">INSERT COIN</button>
            </div>
        </div>
    </div>

    <div id="control-deck">
        <div class="control-row">
            <div class="d-pad">
                <div class="d-btn" id="btn-up">▲</div>
                <div class="d-btn" id="btn-left">◀</div>
                <div id="btn-center"></div>
                <div class="d-btn" id="btn-right">▶</div>
                <div class="d-btn" id="btn-down">▼</div>
            </div>
            <div class="action-group">
                <div class="action-btn" id="btn-fix">FIX</div>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * AUDIO ENGINE
 */
let actx, musicInterval, bassInterval;

function initAudio() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
}

function playTone(freq, type, dur, vol = 0.1, slideFreq = null) {
    if (!actx) return;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, actx.currentTime);
    if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, actx.currentTime + dur);
    
    gain.gain.setValueAtTime(vol, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);

    osc.connect(gain); gain.connect(actx.destination);
    osc.start(); osc.stop(actx.currentTime + dur);
}

function playNoise(dur, vol=0.2) {
    if(!actx) return;
    const bufferSize = actx.sampleRate * dur;
    const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    
    const noise = actx.createBufferSource();
    noise.buffer = buffer;
    
    const filter = actx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 800;
    
    const gain = actx.createGain();
    gain.gain.setValueAtTime(vol, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + dur);

    noise.connect(filter); filter.connect(gain); gain.connect(actx.destination);
    noise.start(); noise.stop(actx.currentTime + dur);
}

// SFX Library
const sfx = {
    jump: () => playTone(300, 'sine', 0.15, 0.1, 600),
    fixHit: () => { playTone(800, 'square', 0.05, 0.1); playNoise(0.05, 0.1); },
    fixComplete: () => { playTone(1200, 'square', 0.1, 0.1); playTone(1600, 'square', 0.15, 0.1, 2000); },
    hurt: () => { playTone(150, 'sawtooth', 0.3, 0.2, 50); playNoise(0.3, 0.3); },
    throw: () => playTone(200, 'triangle', 0.2, 0.1, 100),
    stomp: () => { playNoise(0.4, 0.5); playTone(100, 'square', 0.4, 0.3, 20); },
    win: () => {
        [523, 659, 783, 1046, 1318].forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.2, 0.1), i * 120));
    }
};

function startMusic() {
    if (musicInterval) clearInterval(musicInterval);
    if (bassInterval) clearInterval(bassInterval);
    
    const melody = [392, 0, 392, 523, 0, 659, 783, 0];
    const bass = [130, 130, 196, 130];
    let mStep = 0, bStep = 0;
    
    musicInterval = setInterval(() => {
        if (melody[mStep]) playTone(melody[mStep], 'square', 0.1, 0.05);
        mStep = (mStep + 1) % melody.length;
    }, 150);
    
    bassInterval = setInterval(() => {
        playTone(bass[bStep], 'sawtooth', 0.15, 0.08);
        bStep = (bStep + 1) % bass.length;
    }, 300);
}

function stopMusic() {
    clearInterval(musicInterval); clearInterval(bassInterval);
}

// Haptics
function vibe(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
}

/**
 * GAME ENGINE
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Grid & Coordinates
const COLS = 3; const ROWS = 5;
const PAD_X = 60; const PAD_Y = 180; 
const CELL_W = 80; const CELL_H = 80;

let score = 0, lives = 3, level = 1;
let gameState = 'START';
let frameCount = 0;
let cameraShake = 0;

// Added invincibleTimer to track I-Frames
let felix = { col: 1, row: 4, actionTimer: 0, xOffset: 0, yOffset: 0, invincibleTimer: 0 };
let ralph = { x: 180, y: 100, targetX: 180, timer: 0, state: 'IDLE' };
let windows = [];
let bricks = [];
let particles = [];
let birds = [];

function initLevel() {
    windows = []; bricks = []; particles = []; birds = [];
    let brokenCount = 0;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            let state = 0;
            let rand = Math.random();
            if (rand < 0.2 + (level * 0.05)) state = 2;
            else if (rand < 0.4 + (level * 0.05)) state = 1;
            
            if (state > 0) brokenCount++;
            windows.push({ col: c, row: r, state: state, anim: 0 });
        }
    }
    if (brokenCount === 0) windows[0].state = 2;
    felix.col = 1; felix.row = 4;
    felix.invincibleTimer = 0; // Reset i-frames on new level
}

function spawnParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8 - 2,
            life: 20 + Math.random()*20, color: color
        });
    }
}

function updatePhysics() {
    if (gameState !== 'PLAY') return;
    frameCount++;
    if (cameraShake > 0) cameraShake--;
    
    // Decrease i-frames if active
    if (felix.invincibleTimer > 0) felix.invincibleTimer--;

    // Felix visual smoothing
    felix.xOffset *= 0.7; felix.yOffset *= 0.7;
    if (felix.actionTimer > 0) felix.actionTimer--;

    // Ralph Logic
    let speed = 2 + level;
    if (ralph.state === 'IDLE') {
        if (Math.abs(ralph.x - ralph.targetX) < speed) {
            ralph.x = ralph.targetX;
            ralph.timer++;
            if (ralph.timer > (60 - level*5)) {
                ralph.state = 'THROW';
                ralph.timer = 0;
            }
        } else {
            ralph.x += (ralph.x < ralph.targetX) ? speed : -speed;
        }
    } else if (ralph.state === 'THROW') {
        ralph.timer++;
        if (ralph.timer === 15) {
            bricks.push({ x: ralph.x, y: ralph.y + 20, vx: (Math.random()-0.5)*0.5, vy: -2, rot: 0 });
            sfx.throw(); cameraShake = 5;
        }
        if (ralph.timer > 30) {
            ralph.state = 'IDLE'; ralph.timer = 0;
            let targetCol = Math.random() < 0.6 ? felix.col : Math.floor(Math.random() * COLS);
            ralph.targetX = PAD_X + targetCol * CELL_W + CELL_W/2;
            if(Math.random() < 0.3) { sfx.stomp(); cameraShake = 15; vibe(50); }
        }
    }

    // Bird Logic
    if (level > 1 && Math.random() < 0.01) {
        let yPos = PAD_Y + Math.floor(Math.random() * ROWS) * CELL_H + CELL_H/2;
        birds.push({ x: -20, y: yPos, vx: 3 + level*0.5 });
    }
    for(let i = birds.length-1; i>=0; i--) {
        birds[i].x += birds[i].vx;
        if(birds[i].x > 400) birds.splice(i, 1);
    }

    // Brick Logic (Physics)
    let fx = PAD_X + felix.col * CELL_W + CELL_W/2;
    let fy = PAD_Y + felix.row * CELL_H + CELL_H/2;

    for (let i = bricks.length - 1; i >= 0; i--) {
        let b = bricks[i];
        b.vy += 0.4; // Gravity
        b.x += b.vx; b.y += b.vy; b.rot += 0.2;

        // Collision with Felix (Only if NOT invincible)
        if (felix.invincibleTimer === 0 && Math.hypot(b.x - fx, b.y - fy) < 25) {
            bricks.splice(i, 1);
            takeDamage();
            continue;
        }
        
        if (b.y > canvas.height + 50) bricks.splice(i, 1); 
    }

    // Collision with birds (Only if NOT invincible)
    for (let i = birds.length - 1; i >= 0; i--) {
        if (felix.invincibleTimer === 0 && Math.hypot(birds[i].x - fx, birds[i].y - fy) < 20) {
            birds.splice(i, 1);
            takeDamage();
        }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function takeDamage() {
    lives--;
    felix.invincibleTimer = 90; // Grant 1.5 seconds of invincibility (90 frames at 60fps)
    sfx.hurt(); vibe([100, 50, 100]); cameraShake = 20;
    spawnParticles(PAD_X + felix.col * CELL_W + CELL_W/2, PAD_Y + felix.row * CELL_H + CELL_H/2, '#00f', 20);
    if (lives <= 0) {
        gameState = 'OVER'; stopMusic();
    }
}

function handleInput(dx, dy) {
    if (gameState !== 'PLAY') return;
    let newC = felix.col + dx; let newR = felix.row + dy;
    if (newC >= 0 && newC < COLS && newR >= 0 && newR < ROWS) {
        felix.col = newC; felix.row = newR;
        felix.xOffset = -dx * CELL_W * 0.5; felix.yOffset = -dy * CELL_H * 0.5;
        sfx.jump(); vibe(10);
    }
}

function handleFix() {
    if (gameState !== 'PLAY') return;
    felix.actionTimer = 10;
    let w = windows.find(w => w.col === felix.col && w.row === felix.row);
    let wx = PAD_X + w.col * CELL_W + CELL_W/2;
    let wy = PAD_Y + w.row * CELL_H + CELL_H/2;

    if (w && w.state > 0) {
        w.state--;
        w.anim = 10;
        score += 50;
        spawnParticles(wx, wy, '#fff', 10);
        vibe(20);
        
        if (w.state === 0) {
            score += 100; sfx.fixComplete();
            spawnParticles(wx, wy, '#8df', 15);
            checkWin();
        } else {
            sfx.fixHit();
        }
    } else {
        sfx.fixHit();
    }
}

function checkWin() {
    if (windows.every(w => w.state === 0)) {
        gameState = 'WIN'; score += 1000 * level;
        sfx.win(); stopMusic();
        setTimeout(() => { level++; initLevel(); gameState = 'PLAY'; startMusic(); }, 3000);
    }
}

function drawRect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(Math.round(x), Math.round(y), w, h); }

function drawRender() {
    ctx.save();
    
    if (cameraShake > 0) {
        let dx = (Math.random()-0.5)*cameraShake;
        let dy = (Math.random()-0.5)*cameraShake;
        ctx.translate(dx, dy);
    }

    // Sky
    drawRect(0, 0, canvas.width, canvas.height, '#124');
    
    // Clouds 
    ctx.fillStyle = '#235';
    ctx.fillRect(50 + (frameCount*0.2)%400, 70, 80, 20);
    ctx.fillRect((frameCount*0.1)%500 - 50, 100, 100, 30);

    // Building Base 
    drawRect(30, 140, 300, canvas.height, '#622'); // Main brick
    drawRect(20, 130, 320, 20, '#411'); // Roof ledge

    // Brick texture pattern
    ctx.fillStyle = '#511';
    for(let y=160; y<canvas.height; y+=20) {
        let offset = (y/20)%2===0 ? 0 : 20;
        for(let x=40; x<320; x+=40) {
            ctx.fillRect(x + offset, y, 38, 18);
        }
    }

    // Windows
    windows.forEach(w => {
        let x = PAD_X + w.col * CELL_W; let y = PAD_Y + w.row * CELL_H;
        let animShake = w.anim > 0 ? (Math.random()-0.5)*4 : 0;
        if(w.anim > 0) w.anim--;
        
        drawRect(x + animShake, y, 50, 60, '#222');
        drawRect(x+5 + animShake, y+5, 40, 50, '#111');
        drawRect(x-5, y+60, 60, 8, '#aaa');

        if (w.state === 0) {
            drawRect(x+5, y+5, 40, 50, '#4af');
            drawRect(x+10, y+10, 10, 30, '#8df');
        } else if (w.state === 1) {
            drawRect(x+5, y+5, 40, 50, '#4af');
            drawRect(x+5, y+5, 20, 20, '#000');
            ctx.strokeStyle='#fff'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.moveTo(x+25, y+5); ctx.lineTo(x+15, y+25); ctx.lineTo(x+5, y+25); ctx.stroke();
        } else {
            drawRect(x+5, y+5, 10, 15, '#4af');
            drawRect(x+35, y+40, 10, 15, '#4af');
        }
    });

    // Ralph
    ctx.save(); ctx.translate(ralph.x, ralph.y);
    if(ralph.state === 'THROW') ctx.translate(0, -10);
    drawRect(-25, -20, 50, 40, '#d50');
    drawRect(-15, -35, 30, 25, '#fba');
    drawRect(-35, -20, 15, 30, '#fba');
    drawRect(20, -20, 15, 30, '#fba');
    drawRect(-8, -28, 4, 4, '#000'); drawRect(4, -28, 4, 4, '#000');
    drawRect(-10, -32, 8, 2, '#000'); drawRect(2, -32, 8, 2, '#000');
    ctx.restore();

    // Felix
    // Only draw Felix if he is NOT invincible, OR if he is invincible make him flash on/off every 4 frames
    if (felix.invincibleTimer === 0 || Math.floor(frameCount / 4) % 2 === 0) {
        let fx = PAD_X + felix.col * CELL_W + 25 + felix.xOffset;
        let fy = PAD_Y + felix.row * CELL_H + 30 + felix.yOffset;
        
        drawRect(fx-10, fy, 20, 25, '#05f');
        drawRect(fx-8, fy-15, 16, 15, '#fca');
        drawRect(fx-10, fy-20, 20, 8, '#05f');
        drawRect(fx-5, fy+25, 10, 10, '#531');
        
        if (felix.actionTimer > 0) {
            ctx.save(); ctx.translate(fx+15, fy-10); ctx.rotate(Math.PI/4);
            drawRect(-2, -15, 4, 20, '#852'); drawRect(-8, -20, 16, 8, '#fd0');
            ctx.restore();
        } else {
            drawRect(fx+10, fy+10, 4, 15, '#852'); drawRect(fx+6, fy+22, 12, 6, '#fd0');
        }
    }

    // Birds
    birds.forEach(b => {
        drawRect(b.x, b.y, 15, 10, '#fff');
        drawRect(b.x + (frameCount%10 < 5 ? 5 : 0), b.y-5, 10, 5, '#ddd');
    });

    // Bricks
    bricks.forEach(b => {
        ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rot);
        drawRect(-10, -6, 20, 12, '#822');
        ctx.restore();
    });

    // Particles
    particles.forEach(p => drawRect(p.x, p.y, 4, 4, p.color));

    ctx.restore(); // Restore camera shake

    // HUD
    ctx.fillStyle = '#000'; 
    ctx.fillRect(0, 0, canvas.width, 50); 
    ctx.fillStyle = '#333'; 
    ctx.fillRect(0, 50, canvas.width, 4); 
    
    ctx.fillStyle = '#0f0'; 
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.fillText(`SCORE:${score.toString().padStart(6,'0')}`, 10, 20);
    
    ctx.fillStyle = '#fff'; 
    ctx.fillText(`LVL:${level}`, 10, 40);

    for(let i=0; i<3; i++) {
        let x = 85 + (i*20); 
        if (i < lives) {
            drawRect(x, 30, 12, 12, '#f00'); 
            drawRect(x+2, 32, 4, 4, '#ff8'); 
        } else {
            drawRect(x, 30, 12, 12, '#222'); 
            drawRect(x+2, 32, 8, 8, '#111'); 
        }
    }

    // Overlays
    if (gameState === 'OVER') {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#f00'; ctx.font = '24px "Press Start 2P", monospace';
        ctx.textAlign = 'center'; ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
        ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P", monospace';
        ctx.fillText('Tap FIX to Restart', canvas.width/2, canvas.height/2 + 40);
        ctx.textAlign = 'left';
    } else if (gameState === 'WIN') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#0f0'; ctx.font = '20px "Press Start 2P", monospace';
        ctx.textAlign = 'center'; ctx.fillText('LEVEL CLEARED!', canvas.width/2, canvas.height/2);
        ctx.textAlign = 'left';
    }
}

function loop() {
    updatePhysics();
    drawRender();
    requestAnimationFrame(loop);
}

/**
 * CONTROLS
 */
function bindBtn(id, action) {
    const el = document.getElementById(id);
    const trigger = (e) => { e.preventDefault(); action(); };
    el.addEventListener('touchstart', trigger);
    el.addEventListener('mousedown', trigger);
}

bindBtn('btn-up', () => handleInput(0, -1));
bindBtn('btn-down', () => handleInput(0, 1));
bindBtn('btn-left', () => handleInput(-1, 0));
bindBtn('btn-right', () => handleInput(1, 0));
bindBtn('btn-fix', () => {
    if(gameState === 'OVER') {
        score = 0; lives = 3; level = 1; initLevel(); gameState = 'PLAY'; startMusic();
    } else {
        handleFix();
    }
});

document.getElementById('fullscreen-btn').addEventListener('click', () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
            console.log(`Error attempting to enable fullscreen: ${err.message}`);
        });
    } else {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        }
    }
});

window.addEventListener('keydown', (e) => {
    if (['ArrowUp','w','W'].includes(e.key)) handleInput(0, -1);
    if (['ArrowDown','s','S'].includes(e.key)) handleInput(0, 1);
    if (['ArrowLeft','a','A'].includes(e.key)) handleInput(-1, 0);
    if (['ArrowRight','d','D'].includes(e.key)) handleInput(1, 0);
    if ([' ','Enter'].includes(e.key)) {
        if(gameState === 'OVER') { score=0; lives=3; level=1; initLevel(); gameState='PLAY'; startMusic(); }
        else handleFix();
    }
});

document.getElementById('btn-insert-coin').addEventListener('click', () => {
    initAudio();
    document.getElementById('start-overlay').style.display = 'none';
    score = 0; lives = 3; level = 1;
    initLevel();
    gameState = 'PLAY';
    startMusic();
});

drawRender();
loop();

</script>
</body>
</html>
