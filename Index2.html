<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fix-It Felix Jr. - RPG Edition</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<div id="arcade-cabinet">
    <div id="fullscreen-btn" title="Toggle Fullscreen">⛶</div>
    <div id="screen-bezel">
        <div id="game-container" class="crt">
            <canvas id="gameCanvas" width="360" height="600"></canvas>
            
            <div id="start-overlay" class="overlay">
                <h2 style="color:#4cf; text-shadow: 2px 2px #00f;">FIX-IT<br>FELIX JR.</h2>
                <p style="font-size: 10px; line-height: 1.5; color: #aaa; margin: 10px;">
                    Dodge Ralph's bricks!<br>Deeper levels require<br>more hits per window.
                </p>
                
                <div id="checkpoint-selector">
                    <button id="btn-prev-cp" class="cp-btn">◀</button>
                    <span id="cp-text">START LVL: 1</span>
                    <button id="btn-next-cp" class="cp-btn">▶</button>
                </div>

                <button id="btn-insert-coin" class="menu-btn blinking">INSERT COIN</button>
                <button id="btn-skills" class="menu-btn">SKILL MAP</button>
            </div>

            <div id="skill-tree-overlay" class="overlay" style="display:none;">
                <div id="skill-tree-header">
                    <div class="wrench-count">WRENCHES: <span id="ui-wrenches">0</span></div>
                </div>
                
                <div id="zoom-controls">
                    <button id="btn-zoom-in" class="zoom-btn">+</button>
                    <button id="btn-zoom-out" class="zoom-btn">-</button>
                </div>

                <div id="map-viewport">
                    <div id="map-content">
                        <canvas id="skill-lines" width="3000" height="3000"></canvas>
                        <div id="nodes-container">
                            </div>
                    </div>
                </div>
                
                <button id="btn-restart-run">PLAY</button>
            </div>

        </div>
    </div>

    <div id="control-deck">
        <div class="control-row">
            <div class="d-pad">
                <div class="d-btn" id="btn-up">▲</div>
                <div class="d-btn" id="btn-left">◀</div>
                <div id="btn-center"></div>
                <div class="d-btn" id="btn-right">▶</div>
                <div class="d-btn" id="btn-down">▼</div>
            </div>
            <div class="action-group">
                <div class="action-btn" id="btn-fix">FIX</div>
            </div>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
